<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>ENVRI-Hub Next</title>
    <link rel="shortcut icon" href="assets/img/favicon/envri-favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon/envri-favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon/envri-favicon-16x16.png" />
    <link rel="manifest" href="assets/img/favicon/manifest.json" />
    <meta name="theme-color" content="#ffffff" />
    <base href="/" />
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport" />
    <!-- Matomo -->
  </head>

  <body class="epos">
    <app-root></app-root>
    <!-- after content so it doesn't hinder rendering times -->
    <script>
      const siteId = window.__env && window.__env.matomoSiteId;
      if(!siteId) {
        console.warn('Matomo site ID not set, skipping Matomo initialization');
      }
      else{
        console.warn('Yes, var loaded! ;)');
        var _paq = window._paq = window._paq || [];
        /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);
        (function() {
          var u="//analytics.envri.eu/";
          _paq.push(['setTrackerUrl', u+'matomo.php']);
          _paq.push(['setSiteId', siteId]);
          var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
          g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
        })();
      }
    </script>
    <!-- End Matomo Code -->
  </body>
</html>
